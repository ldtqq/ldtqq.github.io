<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奶龙官方主页</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FFD93D',
                        secondary: '#FF9A8B',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        html { scroll-behavior: smooth; }
        .fade-in {
            opacity: 0; transform: translateY(20px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        .fade-in.visible { opacity: 1; transform: translateY(0); }
        .img-hover { transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .img-hover:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        img { display: block; max-width: 100%; object-fit: cover; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <!-- 导航栏 -->
    <nav id="navbar" class="fixed w-full top-0 z-50 transition-all duration-300 py-4">
        <div class="container mx-auto px-6 md:px-12 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <img src="https://raw.githubusercontent.com/ldtqq/ldtqq.github.io/main/images/nailong-icon.png" alt="奶龙图标" class="w-8 h-8 rounded-full">
                <span class="text-xl font-bold text-primary">奶龙星球</span>
            </div>
            <div class="hidden md:flex gap-8">
                <a href="#home" class="text-gray-700 hover:text-primary">首页</a>
                <a href="#gallery" class="text-gray-700 hover:text-primary">图鉴</a>
                <a href="#profile" class="text-gray-700 hover:text-primary">档案</a>
                <a href="#daily" class="text-gray-700 hover:text-primary">日常</a>
                <a href="#wallpaper" class="text-gray-700 hover:text-primary">壁纸</a>
            </div>
            <button id="menuBtn" class="md:hidden">
                <i class="fas fa-bars text-xl"></i>
            </button>
        </div>
        <div id="mobileMenu" class="hidden md:hidden bg-white shadow-lg absolute w-full">
            <div class="container mx-auto px-6 py-4 flex flex-col gap-4">
                <a href="#home">首页</a>
                <a href="#gallery">图鉴</a>
                <a href="#profile">档案</a>
                <a href="#daily">日常</a>
                <a href="#wallpaper">壁纸</a>
            </div>
        </div>
    </nav>

    <!-- 首页 -->
    <section id="home" class="min-h-screen flex items-center justify-center relative">
        <div class="absolute inset-0">
            <img src="https://raw.githubusercontent.com/ldtqq/ldtqq.github.io/main/images/nailong-banner.jpg" alt="奶龙首页大图" class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-black/30"></div>
        </div>
        <div class="container mx-auto px-6 relative z-10 text-center">
            <h1 class="text-4xl md:text-5xl font-bold text-white mb-6">可爱奶龙 · 萌趣星球</h1>
            <p class="text-xl text-white/90 mb-8">治愈系小黄龙，传递快乐与可爱</p>
            <a href="#gallery" class="inline-block bg-primary hover:bg-primary/90 text-gray-800 font-medium px-8 py-3 rounded-full">
                探索更多 <i class="fas fa-arrow-down ml-2"></i>
            </a>
        </div>
    </section>

    <!-- 图鉴 -->
    <section id="gallery" class="py-20 bg-white">
        <div class="container mx-auto px-6">
            <div class="text-center mb-16 fade-in">
                <h2 class="text-3xl md:text-4xl font-bold mb-4">形象图鉴</h2>
                <p class="text-gray-600">每一面都超萌</p>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div class="fade-in">
                    <div class="bg-gray-50 rounded-2xl overflow-hidden img-hover h-72">
                        <img src="https://raw.githubusercontent.com/ldtqq/ldtqq.github.io/main/images/nailong1.jpg" alt="奶龙图鉴1">
                    </div>
                    <div class="mt-4 text-center">
                        <h3 class="font-semibold">可爱头像</h3>
                    </div>
                </div>
                <div class="fade-in">
                    <div class="bg-gray-50 rounded-2xl overflow-hidden img-hover h-72">
                        <img src="https://raw.githubusercontent.com/ldtqq/ldtqq.github.io/main/images/nailong2.jpg" alt="奶龙图鉴2">
                    </div>
                    <div class="mt-4 text-center">
                        <h3 class="font-semibold">全身形象</h3>
                    </div>
                </div>
                <div class="fade-in">
                    <div class="bg-gray-50 rounded-2xl overflow-hidden img-hover h-72">
                        <img src="https://raw.githubusercontent.com/ldtqq/ldtqq.github.io/main/images/nailong3.jpg" alt="奶龙图鉴3">
                    </div>
                    <div class="mt-4 text-center">
                        <h3 class="font-semibold">表情合集</h3>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 档案 -->
    <section id="profile" class="py-20 bg-gray-50">
        <div class="container mx-auto px-6">
            <div class="flex flex-col lg:flex-row items-center gap-12">
                <div class="lg:w-1/2 fade-in">
                    <img src="https://raw.githubusercontent.com/ldtqq/ldtqq.github.io/main/images/nailong4.jpg" alt="奶龙档案" class="w-full rounded-2xl shadow-xl">
                </div>
                <div class="lg:w-1/2 fade-in">
                    <h2 class="text-3xl md:text-4xl font-bold mb-4">角色档案</h2>
                    <p class="text-gray-600 mb-6">认识这只可爱的小黄龙</p>
                    <div class="space-y-4">
                        <div>
                            <h3 class="font-semibold">名字：奶龙</h3>
                            <p class="text-gray-600">圆滚滚的黄色小龙，大眼睛超萌</p>
                        </div>
                        <div>
                            <h3 class="font-semibold">性格：呆萌可爱</h3>
                            <p class="text-gray-600">天真无邪，有点小迷糊，治愈感满满</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 日常 -->
    <section id="daily" class="py-20 bg-white">
        <div class="container mx-auto px-6">
            <div class="text-center mb-16 fade-in">
                <h2 class="text-3xl md:text-4xl font-bold mb-4">趣味日常</h2>
                <p class="text-gray-600">奶龙的快乐生活</p>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 fade-in">
                <div class="bg-gray-50 rounded-2xl overflow-hidden img-hover">
                    <img src="https://raw.githubusercontent.com/ldtqq/ldtqq.github.io/main/images/nailong5.jpg" alt="奶龙日常1" class="h-60 w-full">
                </div>
                <div class="bg-gray-50 rounded-2xl overflow-hidden img-hover">
                    <img src="https://raw.githubusercontent.com/ldtqq/ldtqq.github.io/main/images/nailong6.jpg" alt="奶龙日常2" class="h-60 w-full">
                </div>
            </div>
        </div>
    </section>

    <!-- 壁纸 -->
    <section id="wallpaper" class="py-20 bg-gray-50">
        <div class="container mx-auto px-6">
            <div class="text-center mb-16 fade-in">
                <h2 class="text-3xl md:text-4xl font-bold mb-4">壁纸专区</h2>
                <p class="text-gray-600">把奶龙设为你的屏幕吧</p>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="fade-in">
                    <div class="bg-white rounded-2xl overflow-hidden shadow-lg img-hover">
                        <img src="https://raw.githubusercontent.com/ldtqq/ldtqq.github.io/main/images/nailong7.jpg" alt="电脑壁纸" class="w-full">
                    </div>
                    <div class="mt-4 flex justify-between items-center">
                        <div>
                            <h3 class="font-semibold">电脑壁纸</h3>
                            <p class="text-gray-600 text-sm">1920×1080</p>
                        </div>
                        <a href="https://raw.githubusercontent.com/ldtqq/ldtqq.github.io/main/images/nailong7.jpg" download class="bg-primary px-4 py-2 rounded-full text-sm">下载</a>
                    </div>
                </div>
                <div class="fade-in">
                    <div class="bg-white rounded-2xl overflow-hidden shadow-lg img-hover">
                        <img src="https://raw.githubusercontent.com/ldtqq/ldtqq.github.io/main/images/nailong8.jpg" alt="手机壁纸" class="w-full">
                    </div>
                    <div class="mt-4 flex justify-between items-center">
                        <div>
                            <h3 class="font-semibold">手机壁纸</h3>
                            <p class="text-gray-600 text-sm">1080×1920</p>
                        </div>
                        <a href="https://raw.githubusercontent.com/ldtqq/ldtqq.github.io/main/images/nailong8.jpg" download class="bg-primary px-4 py-2 rounded-full text-sm">下载</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="py-8 bg-gray-800 text-white text-center">
        <p>© 2026 奶龙星球 | 可爱永远在线</p>
    </footer>

    <script>
        // 导航滚动
        const navbar = document.getElementById('navbar');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                navbar.classList.add('bg-white', 'shadow-md');
            } else {
                navbar.classList.remove('bg-white', 'shadow-md');
            }
        });

        // 移动端菜单
        const menuBtn = document.getElementById('menuBtn');
        const mobileMenu = document.getElementById('mobileMenu');
        menuBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
        });

        // 滚动渐入
        const fadeElements = document.querySelectorAll('.fade-in');
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('visible');
            });
        }, { threshold: 0.1 });
        fadeElements.forEach(el => observer.observe(el));
    </script>

</body>
</html>
